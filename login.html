<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영진전문대학교 - 로그인</title>
    <!-- Google Fonts: Outfit & Noto Sans KR -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Shared CSS -->
    <link rel="stylesheet" href="styles.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Add minor login-specific styles here if needed */
        .auth-switch-text {
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            margin-top: 20px;
        }
        .auth-switch-text a {
            color: var(--yju-accent);
            text-decoration: none;
            font-weight: 600;
            margin-left: 6px;
            transition: color 0.3s ease;
        }
        .auth-switch-text a:hover {
            color: var(--white);
            text-decoration: underline;
        }
        /* Custom styles for error toast notifications */
        .toast-notification {
            position: fixed;
            top: 20px;
            right: -300px;
            background: rgba(244, 63, 94, 0.9);
            border: 1px solid rgba(244, 63, 94, 0.3);
            backdrop-filter: blur(10px);
            color: var(--white);
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            transition: right 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast-notification.active {
            right: 20px;
        }
        .toast-notification i {
            font-size: 18px;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(10, 15, 29, 0.85);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            box-shadow: var(--shadow-premium);
            animation: modal-appear 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }
        @keyframes modal-appear {
            0% { transform: scale(0.9) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--white);
        }
        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
            transition: color 0.3s;
        }
        .close-btn:hover {
            color: var(--error);
        }
        .modal-body {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .find-result {
            display: none;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 12px;
            padding: 15px;
            color: var(--success);
            text-align: center;
            font-weight: 600;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <div class="signup-card">
            <!-- Header with logo and title -->
            <div class="card-header">
                <div class="logo-container">
                    <svg class="yju-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M50 10 L85 25 V55 C85 75 68 90 50 95 C32 90 15 75 15 55 V25 L50 10 Z" fill="var(--yju-primary)" stroke="var(--yju-accent)" stroke-width="4"/>
                        <path d="M35 35 L50 52 L65 35" stroke="var(--white)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M50 52 V75" stroke="var(--white)" stroke-width="6" stroke-linecap="round"/>
                        <path d="M30 65 Q50 72 70 65" stroke="var(--yju-accent)" stroke-width="3" stroke-linecap="round"/>
                    </svg>
                </div>
                <h1 class="brand-title">YEUNGJIN</h1>
                <p class="brand-subtitle">영진전문대학교 로그인</p>
            </div>

            <!-- Form -->
            <form id="login-form" novalidate>
                <!-- ID Field -->
                <div class="input-group" id="group-id">
                    <label for="user_id"><i class="fa-regular fa-user"></i> 아이디</label>
                    <div class="input-wrapper">
                        <input type="text" id="user_id" name="user_id" placeholder="아이디를 입력해 주세요" required>
                    </div>
                    <p class="helper-text">아이디를 입력해 주세요.</p>
                </div>

                <!-- Password Field -->
                <div class="input-group" id="group-password">
                    <label for="password"><i class="fa-regular fa-key"></i> 비밀번호</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" placeholder="비밀번호를 입력해 주세요" required>
                        <button type="button" class="toggle-password" tabindex="-1"><i class="fa-regular fa-eye"></i></button>
                    </div>
                    <p class="helper-text">비밀번호를 입력해 주세요.</p>
                </div>

                <!-- Remember ID checkbox -->
                <div class="checkbox-group">
                    <label class="custom-checkbox">
                        <input type="checkbox" id="remember_id" name="remember_id">
                        <span class="checkmark"></span>
                        <span class="checkbox-text">아이디 저장</span>
                    </label>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-submit" id="btn-submit">
                    <span class="btn-text">로그인</span>
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>

                <!-- Auth Switch Options -->
                <p class="auth-switch-text" style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
                    <a href="#" id="link-find-id" style="color: var(--text-muted); font-size: 13px; font-weight: 500;"><i class="fa-regular fa-circle-question"></i> 아이디 찾기</a>
                    <span>
                        아직 회원이 아니신가요? 
                        <a href="index.html?v=2">회원가입</a>
                    </span>
                </p>
            </form>
        </div>
    </div>

    <!-- Find ID Modal -->
    <div class="modal" id="find-id-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title"><i class="fa-solid fa-magnifying-glass"></i> 아이디 찾기</h3>
                <button type="button" class="close-btn" id="close-find-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <div class="input-group" id="group-find-name" style="gap: 8px;">
                    <label for="find_name" style="font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 6px;"><i class="fa-regular fa-user" style="color: var(--yju-accent);"></i> 이름</label>
                    <div class="input-wrapper">
                        <input type="text" id="find_name" placeholder="실명을 입력해 주세요" required>
                    </div>
                </div>
                <div class="input-group" id="group-find-email" style="gap: 8px;">
                    <label for="find_email" style="font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 6px;"><i class="fa-regular fa-envelope" style="color: var(--yju-accent);"></i> 이메일</label>
                    <div class="input-wrapper">
                        <input type="email" id="find_email" placeholder="example@email.com" required>
                    </div>
                </div>
                <button type="button" class="btn-submit" id="btn-find-id" style="margin-top: 10px; width: 100%; padding: 14px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s; border: none; background: linear-gradient(135deg, var(--yju-primary) 0%, var(--yju-secondary) 100%); color: var(--white);">
                    <span class="btn-text">아이디 조회</span>
                </button>
                <div class="find-result" id="find-id-result"></div>
            </div>
        </div>
    </div>

    <!-- Error Toast Notification -->
    <div class="toast-notification" id="login-toast">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span id="toast-message">아이디 또는 비밀번호가 잘못되었습니다.</span>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Custom Script -->
    <script src="login.js?v=2"></script>
</body>
</html>
